name: CI

on: [push, pull_request]

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install -r requirements.txt
    - run: |
        python assignment2.py
        python exercises1/practice.py
        python exercises2/analysis.py
        python ml_practice/concrete.py

  latex:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install TeX Live
      run: sudo apt-get update && sudo apt-get install -y texlive texlive-latex-extra
    - name: Compile LaTeX files
      run: |
        for f in $(find . -name "*.tex"); do
          echo "Compiling $f"
          pdflatex -interaction=nonstopmode -halt-on-error "$f"
        done
