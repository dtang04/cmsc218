name: Python CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - run: pip install -r requirements.txt
    - run: |
        python assignment2.py
        python exercises1/practice.py
        python exercises2/analysis.py
        python ml_practice/concrete.py
